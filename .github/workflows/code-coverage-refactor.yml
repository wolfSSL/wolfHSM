name: Code Coverage Refactor

on:
  push:
    branches: [ 'master', 'main', 'release/**' ]
  pull_request:
    branches: [ '*' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: base
            flags: ""
          - name: dma
            flags: "DMA=1"
          - name: threadsafe
            flags: "THREADSAFE=1"
          - name: she
            flags: "SHE=1"
          - name: auth
            flags: "AUTH=1"
          - name: nocrypto
            flags: "NOCRYPTO=1"
    steps:
      - uses: actions/checkout@v4

      - name: Install gcovr
        # Pin a modern gcovr via pipx; the apt-shipped 7.0 on ubuntu-noble
        # cannot parse gcc 13's gcov output with block IDs >= 10000 (fixed
        # upstream in gcovr 7.1, see gcovr PR #883).
        run: pipx install 'gcovr==8.6'

      - name: Checkout wolfssl
        uses: actions/checkout@v4
        with:
          repository: wolfssl/wolfssl
          path: wolfssl

      - name: Build, run, and emit tracefile (${{ matrix.name }})
        run: |
          cd test-refactor/posix && make coverage-json \
            OUT=$GITHUB_WORKSPACE/cov-json/refactor-${{ matrix.name }}.json \
            WOLFSSL_DIR=../../wolfssl ${{ matrix.flags }}

      - name: Upload tracefile
        uses: actions/upload-artifact@v4
        with:
          name: refactor-tracefile-${{ matrix.name }}
          path: cov-json/refactor-${{ matrix.name }}.json
          retention-days: 7

  merge:
    needs: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install gcovr
        run: pipx install 'gcovr==8.6'

      - name: Download refactor tracefiles
        uses: actions/download-artifact@v4
        with:
          pattern: refactor-tracefile-*
          path: cov-json
          merge-multiple: true

      - name: Merge tracefiles into HTML report
        run: |
          # nullglob so an empty match returns 0 files instead of the
          # literal pattern, which would slip past the guard below.
          shopt -s nullglob
          files=(cov-json/refactor-*.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No tracefiles found to merge" >&2
            exit 1
          fi
          # Build "--add-tracefile <path>" pairs for each tracefile.
          args=()
          for f in "${files[@]}"; do
            args+=(--add-tracefile "$f")
          done
          mkdir -p coverage-refactor-merged
          gcovr "${args[@]}" \
            --html-details coverage-refactor-merged/index.html \
            --print-summary

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-refactor-report
          path: coverage-refactor-merged/
          retention-days: 30
